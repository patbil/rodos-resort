    <main>
      <section id="start">
        <video
          class="hero-video"
          id="hero-video"
          autoplay

          playsinline
          preload="auto"

        </video>
        <div class="hero-overlay"></div>
        <div class="hero-particles" id="hero-particles-container"></div>
        <div class="hero-content">
          <div class="hero-tag" data-i18n-html="hero.tag"></div>
          <h1 class="hero-title">
            <span class="small" data-i18n="hero.title.small"></span>
            <span class="big" data-i18n="hero.title.big"></span>
          </h1>
          <p class="hero-desc" data-i18n="hero.desc"></p>
          <div class="hero-buttons">
            <a href="#contact" class="btn-primary" data-i18n="hero.btnBook"></a>
            <a
              href="#gallery"
              class="btn-outline"
              data-i18n="hero.btnDiscover"
            ></a>
          </div>
        </div>
        <div class="hero-scroll">
          <div class="hero-scroll-bar"></div>
          <span data-i18n="hero.scroll"></span>
        </div>
      </section>

      <section id="about">
        <div class="about-image">
          <img
            src="./assets/img/cottages.jpg"
            srcset="
              ./assets/img/sm/cottages.jpg  640w,
              ./assets/img/cottages.jpg    1000w
            "
            sizes="(max-width: 960px) 100vw, 50vw"
            alt="Domki RODOS w Rowach"
            loading="lazy"
            decoding="async"
          />
        </div>
        <div class="about-text reveal-left">
          <span class="eyebrow" data-i18n="about.eyebrow"></span>
          <h2 class="section-heading" data-i18n-html="about.title"></h2>
          <div class="about-divider"></div>
          <p class="section-paragraph" data-i18n-html="about.desc"></p>
          <div class="stats-row">
            <div>
              <div class="stat-num">3</div>
              <div class="stat-label" data-i18n="about.stat.types"></div>
            </div>
            <div>
              <div class="stat-num">8<sub class="stat-unit">os.</sub></div>
              <div class="stat-label" data-i18n="about.stat.guests"></div>
            </div>
            <div>
              <div class="stat-num">60<sub class="stat-unit">m²</sub></div>
              <div class="stat-label" data-i18n="about.stat.area"></div>
            </div>
            <div>
              <div class="stat-num">4.9<sub class="stat-star">★</sub></div>
              <div class="stat-label" data-i18n="about.stat.reviews"></div>
            </div>
          </div>
        </div>
      </section>

      <section id="attractions">

      <section id="contact">
        <div class="contact-inner">
          <div class="contact-header reveal">
            <span class="eyebrow" data-i18n="ko.eyebrow"></span>

              class="section-paragraph section-paragraph-mt"
              data-i18n="ko.desc"
            ></p>
          </div>
          <div class="contact-grid">
            <div class="reveal-left">
              <div class="contact-info-block">
                <div class="contact-item">
                  <div class="contact-item-icon">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path

                      />
                      <circle cx="12" cy="10" r="3" />
                    </svg>
                  </div>
                  <div>
                    <div
                      class="contact-item-label"
                      data-i18n="ko.addr.lbl"
                    ></div>
                    <div
                      class="contact-item-value"
                      data-i18n-html="ko.addr.val"
                    ></div>
                  </div>
                </div>
                <div class="contact-item">
                  <div class="contact-item-icon">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path
                        d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"
                      />
                    </svg>

                  <div>
                    <div
                      class="contact-item-label"
                      data-i18n="ko.tel.lbl"
                    ></div>
                    <div class="contact-item-value">
                      <a href="tel:+48505816638">+48 505 816 638</a>
                    </div>
                  </div>
                </div>
                <div class="contact-item">
                  <div class="contact-item-icon">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path
                        d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"

                      <polyline points="22,6 12,13 2,6" />
                    </svg>
                  </div>
                  <div>
                    <div
                      class="contact-item-label"
                      data-i18n="ko.email.lbl"
                    ></div>
                    <div class="contact-item-value">
                      <a href="mailto:info@rodos-rowy.pl">info@rodos-rowy.pl</a>
                    </div>

                  referrerpolicy="no-referrer-when-downgrade"

                    viewBox="0 0 24 24"

                  <div>
                    <div
                      class="contact-foot-label"
                      data-i18n="ko.foot.pay.lbl"
                    ></div>
                    <div
                      class="contact-foot-value"
                      data-i18n="ko.foot.pay.val"
                    ></div>
                  </div>
                </div>
              </div>

            <div class="reveal">

                <div class="contact-form-title" data-i18n="form.title"></div>
                <div class="form-row-2">
                  <div class="form-group">
                    <label for="f-name" data-i18n="form.name"></label>
                    <input
                      id="f-name"
                      name="name"
                      type="text"
                      data-i18n-placeholder="form.name.ph"
                      placeholder=""
                    />
                  </div>
                  <div class="form-group">
                    <label for="f-email" data-i18n="form.email"></label>
                    <input
                      id="f-email"
                      name="email"
                      type="email"
                      data-i18n-placeholder="form.email.ph"
                      placeholder=""
                    />
                  </div>
                </div>
                <div class="form-row-2">
                  <div class="form-group">
                    <label for="f-tel" data-i18n="form.tel"></label>
                    <input
                      id="f-tel"
                      name="tel"
                      type="tel"
                      data-i18n-placeholder="form.tel.ph"
                      placeholder=""
                    />
                  </div>
                  <div class="form-group">
                    <label for="f-type" data-i18n="form.type"></label>
                    <select id="f-type" name="type">
                      <option value="" data-i18n="form.type.opt.none"></option>
                      <option data-i18n="form.type.opt.cottage"></option>
                      <option data-i18n="form.type.opt.apt5"></option>
                      <option data-i18n="form.type.opt.apt8"></option>
                    </select>
                  </div>
                </div>
                <div class="form-row-2">
                  <div class="form-group">
                    <label for="date-in" data-i18n="form.date-in"></label>
                    <input
                      type="text"
                      class="date-picker-input"
                      id="date-in"
                      name="date-in"
                      data-i18n-placeholder="form.date.ph"
                      placeholder=""
                      readonly
                    />
                  </div>
                  <div class="form-group">
                    <label for="date-out" data-i18n="form.date-out"></label>
                    <input
                      type="text"
                      class="date-picker-input"
                      id="date-out"
                      name="date-out"
                      data-i18n-placeholder="form.date.ph"
                      placeholder=""
                      readonly
                    />
                  </div>
                </div>
                <div class="form-row-2">
                  <div class="form-group">
                    <label for="f-adults" data-i18n="form.adults"></label>
                    <input
                      id="f-adults"
                      name="adults"
                      type="number"
                      min="1"
                      max="8"
                      placeholder="2"
                    />
                  </div>
                  <div class="form-group">
                    <label for="f-children" data-i18n="form.children"></label>
                    <input
                      id="f-children"
                      name="children"
                      type="number"
                      min="0"
                      max="6"
                      placeholder="0"
                    />
                  </div>
                </div>
                <div class="form-row-2">
                  <div class="form-group">
                    <label for="f-pets" data-i18n="form.pets"></label>
                    <select id="f-pets" name="pets">
                      <option value="nie" data-i18n="form.pets.no"></option>
                      <option value="tak" data-i18n="form.pets.yes"></option>
                    </select>
                  </div>
                  <div class="form-group">
                    <label for="f-source" data-i18n="form.source"></label>
                    <select id="f-source" name="source">
                      <option
                        value=""
                        data-i18n="form.source.opt.none"
                      ></option>
                      <option>Google</option>
                      <option>Facebook</option>
                      <option data-i18n="form.source.opt.recommend"></option>
                      <option>Booking.com</option>
                      <option data-i18n="form.source.opt.other"></option>
                    </select>
                  </div>
                </div>
                <div class="form-group">
                  <label for="f-message" data-i18n="form.message"></label>
                  <textarea
                    id="f-message"
                    name="message"
                    rows="4"
                    data-i18n-placeholder="form.message.ph"
                    placeholder="Dodatkowe informacje, życzenia, pytania..."
                  ></textarea>
                </div>
                <button
                  type="submit"
                  class="btn-primary form-submit"
                  id="submit-btn"
                  data-i18n="form.submit"
                ></button>
                <p class="contact-form-note" data-i18n="form.note"></p>
              </form>
            </div>
          </div>
        </div>
      </section>
